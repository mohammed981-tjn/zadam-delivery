name: zadam_delivery
description: نظام إدارة توصيل طلبات - شركة زادم
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/